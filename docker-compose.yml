services:
  vps-ui:
    build: .
    ports:
      - 5001:5001
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/runner:/home/runner
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/runner/vps-manager/ssh_key:/run/secrets/ssh_key:ro
    networks:
      - default
      - proxy
    restart: unless-stopped

networks:
  default: {}
  proxy:
    external: true
